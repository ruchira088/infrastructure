alertmanager:
  enabled: false

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 300Mi

prometheus:
  prometheusSpec:
    retention: 15d
    # retentionSize kept below PVC size so Prometheus's WAL has headroom
    retentionSize: 18GB
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    # Scrape every ServiceMonitor/PodMonitor in the cluster, not just those tagged with this release
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  ingress:
    enabled: false
  grafana.ini:
    server:
      root_url: https://grafana.home.ruchij.com
      serve_from_sub_path: false
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      memory: 500Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 200Mi

prometheus-node-exporter:
  hostRootFsMount:
    enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      memory: 100Mi
